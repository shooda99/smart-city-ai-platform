<!DOCTYPE html>
<html>
<head>
    <title>Smart City AI Platform</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                🚦 Smart City AI Platform
            </span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">

            <!-- Dashboard -->
            <div class="col-lg-8">
                <div class="card shadow">

                    <div class="card-header">
                        📊 Smart City Dashboard
                    </div>

                    <div class="card-body">
                        <iframe
                            src="{{ looker_url }}"
                            width="100%"
                            height="650"
                            style="border:none;"
                            allowfullscreen>
                        </iframe>
                    </div>

                </div>
            </div>

            <!-- AI Assistant -->
<!-- AI Assistant -->
<div class="col-lg-4">
    <div class="card shadow">

        <div class="card-header">
            🤖 AI Assistant
        </div>

        <div class="card-body">

            <textarea
                id="question"
                class="form-control"
                rows="8"
                placeholder="Ask anything about accident data..."></textarea>

            <div class="d-grid mt-3">
                <button
                    class="btn btn-primary"
                    onclick="askVertexAI()">
                    Ask Vertex AI
                </button>
            </div>

            <hr>

            <h5>AI Response</h5>

            <div
                id="answer"
                class="alert alert-info">
                Ask a question to begin...
            </div>

        </div>

    </div>
</div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
