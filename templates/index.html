<!DOCTYPE html>
<html>
<head>
    <title>Smart City AI Platform</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                🚦 Smart City AI Platform
            </span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">

            <!-- Dashboard -->
            <div class="col-lg-8">
                <div class="card shadow">

                    <div class="card-header">
                        📊 Smart City Dashboard
                    </div>

                    <div class="card-body">
                        <iframe
                            src="{{ looker_url }}"
                            width="100%"
                            height="650"
                            style="border:none;"
                            allowfullscreen>
                        </iframe>
                    </div>

                </div>
            </div>

            <!-- AI Assistant -->
            <div class="col-lg-4">
                <div class="card shadow">

                    <div class="card-header">
                        🤖 AI Assistant
                    </div>

                    <div class="card-body">

                        <textarea
                            id="question"
                            class="form-control"
                            rows="8"
                            placeholder="Ask anything about accident data..."></textarea>

                        <!-- Suggested Questions -->
                        <h6 class="mt-3 mb-2">Try asking</h6>

                        <div class="d-flex flex-wrap gap-2 mb-3">

                            <span
                                class="badge rounded-pill text-bg-light border suggestion"
                                style="cursor:pointer; padding:10px 14px;">
                                Total accidents
                            </span>

                            <span
                                class="badge rounded-pill text-bg-light border suggestion"
                                style="cursor:pointer; padding:10px 14px;">
                                Accidents in 2017
                            </span>

                            <span
                                class="badge rounded-pill text-bg-light border suggestion"
                                style="cursor:pointer; padding:10px 14px;">
                                Most dangerous zone
                            </span>

                        </div>

                        <div class="d-grid">
                            <button
                                class="btn btn-primary"
                                onclick="askVertexAI()">
                                Ask Smart City AI
                            </button>
                        </div>

                        <hr>

                        <h5>AI Response</h5>

                        <div
                            id="answer"
                            class="alert alert-info">
                            Ask a question to begin...
                        </div>

                        <!-- Feedback Section -->
                        <div
                            id="feedback-section"
                            style="display:none; margin-top:20px;">

                            <hr>

                            <h6>Was this response helpful?</h6>

                            <button
                                id="like-btn"
                                class="btn btn-outline-success me-2">
                                👍 Yes
                            </button>

                            <button
                                id="dislike-btn"
                                class="btn btn-outline-danger">
                                👎 No
                            </button>

                            <p
                                id="feedback-message"
                                class="mt-3 text-success fw-bold">
                            </p>

                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
